<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document Upload</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0e0e10;
            --surface: #18181c;
            --border: #2a2a32;
            --accent: #c8a96e;
            --accent-dim: rgba(200, 169, 110, 0.12);
            --text: #f0ede8;
            --muted: #7a7880;
            --success: #4caf84;
            --error: #e05c5c;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(200,169,110,0.07) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; left: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(200,169,110,0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 520px;
            position: relative;
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Gold top bar */
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 0 0 2px 2px;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .icon-wrap {
            width: 56px; height: 56px;
            background: var(--accent-dim);
            border: 1px solid rgba(200,169,110,0.3);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.2rem;
            font-size: 1.5rem;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.875rem;
            margin-top: 0.4rem;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 1.4rem;
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.15s; }
        .form-group:nth-child(3) { animation-delay: 0.2s; }
        .form-group:nth-child(4) { animation-delay: 0.25s; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        input[type="text"],
        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.25s, box-shadow 0.25s;
            outline: none;
        }

        input[type="text"]:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(200,169,110,0.1);
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        /* File drop zone */
        .file-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.8rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.25s, background 0.25s;
            position: relative;
        }

        .file-zone:hover,
        .file-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-dim);
        }

        .file-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%; height: 100%;
        }

        .file-icon { font-size: 2rem; margin-bottom: 0.6rem; }

        .file-zone p {
            font-size: 0.875rem;
            color: var(--muted);
        }

        .file-zone span {
            color: var(--accent);
            font-weight: 500;
        }

        .file-name {
            margin-top: 0.8rem;
            font-size: 0.82rem;
            color: var(--success);
            font-weight: 500;
            display: none;
        }

        .file-name.visible { display: block; }

        .formats {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        /* Submit button */
        button[type="submit"] {
            width: 100%;
            margin-top: 0.5rem;
            padding: 0.95rem;
            background: var(--accent);
            color: #0e0e10;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]:hover {
            opacity: 0.9;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(200,169,110,0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* Shimmer on button */
        button[type="submit"]::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 60%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.5s;
        }
        button[type="submit"]:hover::after { left: 150%; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem; right: 2rem;
            background: var(--surface);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 0.8rem 1.4rem;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="icon-wrap">📄</div>
            <h2>Upload Document</h2>
            <p class="subtitle">Fill in the details and attach your file</p>
        </div>

        <form action="/doc" method="POST" enctype="multipart/form-data" id="uploadForm">

            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" placeholder="e.g. Marksheet, Resume..." required>
            </div>

            <div class="form-group">
                <label>Author</label>
                <input type="text" name="author" placeholder="Your full name..." required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" placeholder="Brief description of the document..." required></textarea>
            </div>

            <div class="form-group">
                <label>File</label>
                <div class="file-zone" id="fileZone">
                    <input type="file" name="file" accept=".pdf,.doc,.docx" required id="fileInput">
                    <div class="file-icon">☁️</div>
                    <p><span>Click to upload</span> or drag & drop</p>
                    <p class="formats">PDF, DOC, DOCX supported</p>
                    <p class="file-name" id="fileName"></p>
                </div>
            </div>

            <button type="submit">Upload Document →</button>

        </form>
    </div>

    <div class="toast" id="toast">✓ Document uploaded successfully!</div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileName  = document.getElementById('fileName');
        const fileZone  = document.getElementById('fileZone');
        const toast     = document.getElementById('toast');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) {
                fileName.textContent = '✓ ' + fileInput.files[0].name;
                fileName.classList.add('visible');
            }
        });

        // Drag & drop highlight
        fileZone.addEventListener('dragover', (e) => { e.preventDefault(); fileZone.classList.add('drag-over'); });
        fileZone.addEventListener('dragleave', () => fileZone.classList.remove('drag-over'));
        fileZone.addEventListener('drop', () => fileZone.classList.remove('drag-over'));

        // Toast on submit
        document.getElementById('uploadForm').addEventListener('submit', () => {
            setTimeout(() => {
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3000);
            }, 300);
        });
    </script>
</body>
</html>
